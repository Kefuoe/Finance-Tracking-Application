<h1>{{ isEdit() ? 'Edit budget' : 'Add budget' }}</h1>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-fields">

      <mat-form-field>
        <mat-label>Category</mat-label>
        <mat-select formControlName="categoryId">
          @for (c of categories(); track c.id) {
            <mat-option [value]="c.id">{{ c.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Amount (R)</mat-label>
        <input matInput type="number" step="0.01" formControlName="amount" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Year</mat-label>
        <input matInput type="number" formControlName="year" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Month (1–12)</mat-label>
        <input matInput type="number" min="1" max="12" formControlName="month" />
      </mat-form-field>

      @if (error()) {
        <p class="amount-expense">{{ error() }}</p>
      }

      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit" [disabled]="submitting()">
          {{ submitting() ? 'Saving…' : 'Save' }}
        </button>
        <a mat-stroked-button routerLink="/budgets">Cancel</a>
      </div>
    </form>
  </mat-card-content>
</mat-card>
